services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mahalo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mahalo}
      POSTGRES_DB: ${POSTGRES_DB:-mahalo}
    ports:
      - "5434:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mahalo} -d ${POSTGRES_DB:-mahalo}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-mahalo}:${POSTGRES_PASSWORD:-mahalo}@db:5434/${POSTGRES_DB:-mahalo}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    ports:
      - "3000:3000"
    volumes:
      - uploads:/app/public/uploads

volumes:
  pg_data:
  uploads:
