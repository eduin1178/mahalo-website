# =============================================================================
# DEVELOPMENT ONLY — DO NOT USE IN PRODUCTION
# =============================================================================
# This compose file exists to run a local Postgres for development.
# Production deploys use Dokploy: the database is a Dokploy-native Postgres
# service and the application image is pulled from Docker Hub.
# See docs/deployment.md for the production deployment runbook.
# =============================================================================

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mahalo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mahalo}
      POSTGRES_DB: ${POSTGRES_DB:-mahalo}
    ports:
      - "5434:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mahalo} -d ${POSTGRES_DB:-mahalo}"]
      interval: 5s
      timeout: 5s
      retries: 10
      
volumes:
  pg_data:

