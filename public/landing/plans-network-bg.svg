<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Abstract home internet network</title>
  <desc id="desc">A premium abstract illustration of connected homes, fiber lines, and a soft blue network grid.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#061331"/>
      <stop offset="0.48" stop-color="#0b1f4d"/>
      <stop offset="1" stop-color="#1a66c9"/>
    </linearGradient>
    <radialGradient id="cyan" cx="70%" cy="34%" r="58%">
      <stop offset="0" stop-color="#7fe3ee" stop-opacity="0.72"/>
      <stop offset="0.42" stop-color="#3fd0e0" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#3fd0e0" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#cyan)"/>
